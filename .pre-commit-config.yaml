repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: no-datetime-utc
        name: Check for datetime.datetime.UTC (Python 3.14 incompatible)
        entry: bash -c 'grep -r "datetime\.datetime\.UTC" scripts/ && exit 1 || exit 0'
        language: system
        pass_filenames: false
        types: [python]
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy --no-incremental
        language: system
        pass_filenames: false
        types: [python]
      - id: docs-consistency
        name: Check RAG documentation consistency
        entry: python -m tools.check_docs_consistency
        language: system
        pass_filenames: false
        types_or: [markdown]
      - id: no-compat-stubs
        name: Check for compatibility stubs and shims
        entry: python -m tools.check_no_compat
        language: system
        pass_filenames: false
        types_or: [python, markdown]
