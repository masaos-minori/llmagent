name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Install dependencies
        run: uv sync --dev
      - name: Format check
        run: uv run ruff format --check scripts/
      - name: Lint check
        run: uv run ruff check scripts/
      - name: Type check
        run: uv run mypy scripts/
      - name: Security scan
        run: uv run bandit -r scripts/ -c pyproject.toml
      - name: Architecture check
        run: PYTHONPATH=scripts uv run lint-imports
      - name: Pre-commit
        run: uv run pre-commit run --all-files

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Install dependencies
        run: uv sync --dev
      - name: Run tests
        run: uv run pytest -v
      - name: Coverage report
        run: |
          uv run coverage run -m pytest tests/
          uv run coverage xml
          uv run diff-cover coverage.xml --compare-branch=main --fail-under=90