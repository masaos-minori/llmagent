name: MCP Docs Consistency

on:
  push:
    paths:
      - "docs/**/*.md"
      - "scripts/check_mcp_docs_consistency.py"
  pull_request:
    paths:
      - "docs/**/*.md"
      - "scripts/check_mcp_docs_consistency.py"

# Cancel in-progress runs for the same workflow + branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: MCP Docs Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run MCP docs consistency checks
        run: |
          set -euo pipefail
          python scripts/check_mcp_docs_consistency.py --skip active
