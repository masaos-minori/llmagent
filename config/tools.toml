# TTL in seconds for in-memory tool call result cache; reuses results within TTL for same tool name + same arguments
tool_cache_ttl = 300

# When true, executes tool_calls sequentially in a loop instead of asyncio.gather() parallel execution; use when ordering is required for write->read dependencies
serial_tool_calls = false

# use_tool_dag: enable dependency-aware scheduling (write-before-read, resource-scoped)
# When true: independent read-only tools run concurrently even in rounds with writes.
# When false: any side-effect tool in the round forces sequential execution (legacy behavior).
use_tool_dag = true

# When true, appends all notes from the notes table to the end of the system prompt at startup
auto_inject_notes = true

# When true, LLM-summarizes tool results exceeding tool_summarize_threshold characters before adding to LLM context
use_tool_summarize = false

# Character threshold for tool result summarization (default: 3000)
tool_summarize_threshold = 3000

# Maximum number of times the same (tool name + arguments) combination may execute; cuts the turn and injects a warning to the LLM when this count is reached (default: 3)
tool_dedup_max_repeats = 3

# Round-level cycle detection window size; cuts the turn if the same round fingerprint (MD5 of tool call set) appears this many times; 0 disables (default: 2)
tool_cycle_detect_window = 2

# Cuts the turn when all tools return errors for this many consecutive turns; 0 disables (default: 3)
tool_error_max_consecutive = 3

# Maximum entries in the tool cache; evicted by LRU; 0 = unlimited (default: 200)
tool_cache_max_size = 200

# Maximum retry count after the same (name, args) results in an error; 0 = disabled (default: 1)
tool_error_retry_max = 1

# Per-tool-server concurrent execution limit; key is the server key from _route(); unknown keys log WARNING at startup; empty = unlimited (default: {})
tool_concurrency_limits = {file_read = 4, file_write = 1, file_delete = 1, shell = 2, web_search = 2, github = 3, rag_pipeline = 4, sqlite = 4, cicd = 2}

# Maximum characters when adding tool call results to the LLM context; excess is truncated
tool_result_max_llm_chars = 8000

# Maximum total characters of all tool results in one turn; results exceeding this are replaced with a /tool show <id> hint
tool_results_turn_max_chars = 50000

# Token-based history compression monitoring threshold; 0 disables; logs logger.warning when chars/4 exceeds this value
context_token_limit = 0

# llamacpp /tokenize endpoint for exact token counting; "" disables (falls back to chars // 4)
tokenize_url = ""

# Excludes the most recent N turns (user+assistant pairs) from compression; default 2
history_protect_turns = 2

# Maximum tokens the LLM generates in one turn; changeable at runtime via /set max_tokens <value>
llm_max_tokens = 1024

# LLM generation temperature (0.0-2.0); lower means more reproducible, higher means more diverse output; changeable at runtime via /set temperature <value>
llm_temperature = 0.2

# MCP server health-check interval in seconds; 0 disables the watchdog
mcp_watchdog_interval = 0

# Maximum restart count the watchdog performs for the same server; after exceeding, only logs a warning
mcp_watchdog_max_restarts = 3

# Seconds of SSE inactivity before HEARTBEAT_TIMEOUT is raised (0 = disabled)
sse_heartbeat_timeout = 30.0

# Number of malformed SSE frames to tolerate before raising MALFORMED_SSE_FRAME
sse_malformed_retry = 2

# Maximum SSE reconnect attempts on retryable in-stream errors (0 = no reconnect)
sse_reconnect_max = 1

# When True, HEARTBEAT_TIMEOUT triggers a reconnect attempt if no partial output
llm_stream_retry_on_heartbeat_timeout = true

# When True, MALFORMED_SSE_FRAME (after budget exhausted) triggers a reconnect
llm_stream_retry_on_malformed_chunk = false