# Markdown Context Compression Engine MCP Server Configuration

status = "production"

# Allowed directories for file access (fail-closed: empty = deny all)
allowed_dirs = []

# Database path
db_path = "/opt/llm/db/mdq.sqlite"

# File matching patterns
include_globs = ["*.md"]
exclude_globs = [".git/**", "__pycache__/**"]

# Maximum number of results to return from search
max_search_results = 100

# Maximum number of characters to include in a snippet
max_snippet_chars = 500

# Maximum number of characters to include in a chunk
max_chunk_chars = 10000

# Maximum number of characters to include in a file
max_file_chars = 100000

# Result size limits (enforced at server level before MCP truncation)
max_results_limit = 100
max_chars_per_chunk = 10000
max_total_result_chars = 100000
max_outline_items = 500
max_grep_matches = 200

# Maximum number of seconds to wait for a search operation
search_timeout_sec = 30

# Enable refresh_index tool (controls whether manual index refresh is allowed)
enable_refresh = true

# Audit log path for write operations
audit_log_path = "/opt/llm/logs/mdq_audit.log"

# Concurrency limit for mdq server (1 = serialize all operations)
concurrency_limit = 1

# Summary cache for large chunks (reduces token usage by returning summaries)
summary_cache_enabled = false
summary_threshold = 5000
summary_model = "default"

# Embedding/hybrid search mode (disabled by default — FTS5-only is production baseline)
use_embedding = false
vector_table = "chunks_vec"
embedding_model = "default"
