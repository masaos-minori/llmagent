# git-mcp server configuration

# allowed_repo_paths: absolute paths of git repositories accessible via this server.
# Empty list = deny all (fail-closed). Add repo paths explicitly.
# Example: allowed_repo_paths = ["/home/masaos/llmagent", "/opt/llm"]
allowed_repo_paths = []

# read_only: when true, write tools (git_add/commit/checkout/pull/push) are rejected.
# Set to false only when write operations are required.
read_only = true

# max_log_entries: cap for git_log output (prevents large data dumps).
max_log_entries = 50

# auth_token: Bearer token; empty string = auth disabled.
auth_token = ""

# NOTE: audit_log_path was removed (2026-07-13). GitConfig.audit_log_path was parsed
# but never read anywhere else in git-mcp -- no file-writing logic exists for it,
# unlike github-mcp/shell-mcp/file-delete-mcp which do open and append to their
# audit_log_path. Call-level logging still goes to logging.getLogger(__name__)
# (see docs/04_mcp_04_05_git.md). Re-add only alongside an actual write implementation.
