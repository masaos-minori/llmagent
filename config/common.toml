# common.toml — shared infrastructure configuration
# Loaded by sqlite_helper.py, db_maintenance.py, and other infrastructure modules.

# rag_db_path: absolute path of the RAG SQLite database file
rag_db_path = "/opt/llm/db/rag.sqlite"

# session_db_path: absolute path of the session SQLite database file
# Contains: sessions, messages, notes, tool_results, memory_entries, memory_vec
session_db_path = "/opt/llm/db/session.sqlite"

# sqlite_vec_so: absolute path of the sqlite-vec extension shared library (.so)
# Required for vec0 virtual table KNN search
sqlite_vec_so = "/opt/llm/sqlite-vec/vec0.so"

# embed_url: multilingual embedding LLM endpoint (multilingual-E5-small)
# Converts text to 384-dimensional vectors
embed_url = "http://127.0.0.1:8003/embedding"

# sqlite_timeout: sqlite3.connect() timeout (seconds)
# Prevents "database is locked" under concurrent write contention even in WAL mode
sqlite_timeout = 30

# sqlite_busy_timeout_ms: PRAGMA busy_timeout value (milliseconds)
# Retries on lock contention instead of returning an immediate error
sqlite_busy_timeout_ms = 30000

# sqlite_wal_checkpoint_mode: WAL checkpoint mode
# Choices: PASSIVE / FULL / RESTART / TRUNCATE; TRUNCATE recommended
sqlite_wal_checkpoint_mode = "TRUNCATE"

# sqlite_retention_max_sessions: maximum number of sessions to retain
# Sessions exceeding this limit are removed by /db purge
sqlite_retention_max_sessions = 100

# sqlite_retention_max_age_days: session retention period (days); 0 = no age limit
sqlite_retention_max_age_days = 90

# sqlite_archive_dir: archive directory for DB rotation
sqlite_archive_dir = "/opt/llm/db/archive"

# embedding_dims: dimensionality of the float32 embedding vectors stored in vec0 tables
# Must match the model output dimensions (all-MiniLM-L6-v2 = 384)
embedding_dims = 384

# workflow_mode: "required" = fail fast when workflow prerequisites missing (production)
#                "auto"     = warn and fall back to direct execution (dev/local)
#                "disabled" = always use direct execution (testing only)
workflow_mode = "required"

# workflow_require_approval: when True, WorkflowEngine requires /approve before verify stage runs
# Disabled by default; enable in production after testing the approval flow.

# eventbus_db_path: absolute path of the event bus SQLite database file
eventbus_db_path = "/opt/llm/db/eventbus.sqlite"
