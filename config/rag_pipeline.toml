# rag-pipeline ingestion configuration

# rag_src_dir: cache directory for crawled text ({sha256}.json format)
rag_src_dir = "/opt/llm/rag-src"

# crawl_delay: request interval during BFS crawl (seconds); minimum 1.0 recommended
crawl_delay = 1.5

# max_depth: maximum BFS crawl depth (URL hops from seed URL)
max_depth = 6

# min_chunk: minimum chunk character count; chunks below this are discarded as noise
min_chunk = 40

# max_chunk: maximum chunk character count; longer text is split
max_chunk = 500

# embed_retry: retry limit for embedding API (E5-small) call failures
embed_retry = 3

# embed_workers: parallel HTTP worker count for embedding API calls (ThreadPoolExecutor)
embed_workers = 4

# fetch_retry: retry limit for HTTP fetch failures (exponential backoff)
fetch_retry = 3

# fetch_timeout: HTTP fetch timeout (seconds)
fetch_timeout = 15

# crawl_concurrency: maximum simultaneous BFS crawl requests (asyncio.Semaphore count)
crawl_concurrency = 3

# max_pages: BFS crawl page count limit; BFS stops when visited count reaches this value
max_pages = 500

# chunk_overlap: sliding window chunk overlap (chars); prepends this many chars from previous chunk tail; 0 = disabled
chunk_overlap = 50

# md_index_enable: enables heading-based chunking for non-.md files via heuristic detection.
# Note: .md / .markdown / .mdx files always use heading-based chunking regardless of this flag.
md_index_enable = false

# md_snippet_max_chars: max chars per Markdown heading section; exceeded sections fall back to text chunking
md_snippet_max_chars = 600

# skip_nofollow: when true, links with rel="nofollow" are excluded from crawl
skip_nofollow = false

# skip_external: when true, links outside the origin are excluded from crawl
skip_external = true

# target_urls: list of [url, lang] pairs to crawl; lang is "ja" / "en" / "auto" (detected by CJK ratio)
target_urls = [
    ["https://ziglang.org/documentation/master/",               "en"],
    ["https://zig.guide/",                                       "en"],
    ["https://www.ruby-lang.org/en/documentation/quickstart/",  "en"],
    ["https://www.ruby-lang.org/ja/documentation/quickstart/",  "ja"],
    ["https://docs.ruby-lang.org/en/3.4/doc/",                  "en"],
    ["https://docs.ruby-lang.org/ja/3.4/doc/",                  "ja"],
    ["https://www.gnu.org/software/emacs/manual/html_node/elisp/", "en"],
]

