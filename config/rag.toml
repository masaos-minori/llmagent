# Number of top results to retrieve from both KNN vector search and BM25 full-text search
top_k_search = 20

# Maximum number of candidates passed to the Cross-Encoder reranker
top_k_rerank = 15

# Number of additional queries generated by MQE (Multi-Query Expansion: rephrases the query N ways)
mqe_n_queries = 3

# Constant for RRF (Reciprocal Rank Fusion: merges multiple search results using 1/(k+rank)); paper recommendation is 60
rrf_k = 60

# Maximum number of tool-calling turns to prevent infinite loops in tool_query endpoint
max_tool_turns = 5

# When true, run MQE (multi-query expansion). When false, search with the original query only
use_mqe = true

# When true, run KNN vector search and BM25 full-text search. When false, skip search and return empty response
use_search = true

# When true, run RRF to merge multiple search results. When false, deduplicate by chunk_id and use original order
use_rrf = true

# When true, run Cross-Encoder reranking. When false, return top_k results sorted by RRF score
use_rerank = true

# Maximum number of RAG chunks appended to the LLM context; passes top_k_rerank -> rerank -> top rag_top_k results
rag_top_k = 5

# Chunks with a rerank score (0-10) below this value are excluded from results; default 0.0 (no filter)
rag_min_score = 0.0

# Maximum number of chunks retrieved from the same document; prevents near-duplicate chunks from chunk_overlap
max_chunks_per_doc = 2

# When true, runs fetch_full_document() two-stage retrieval on turns where the LLM is judged to request additional context
use_two_stage_fetch = false

# Maximum number of documents to expand in two-stage retrieval
two_stage_max_docs = 2

# Base URL of the external RAG HTTP service (e.g. http://127.0.0.1:8010); when set, augment() makes HTTP calls instead of in-process execution; empty string for in-process mode (default: "")
rag_service_url = "http://127.0.0.1:8010"