# Security profile: "local" (auth optional, relaxed checks) or "production" (auth required, strict)
security_profile = "local"

# List of tool argument field names to mask in console display and log output; specify fields such as file_content that may contain sensitive data
masked_fields = ["file_content"]

# List of tool names to automatically block when /plan mode is active; enumerate destructive write/delete operations
plan_blocked_tools = [
  "write_file",
  "create_directory",
  "delete_file",
  "delete_directory",
  "shell_run",
]

# File path prefixes that escalate any operation to "high" risk
approval_protected_paths = [
  "/opt/",
  "/etc/",
  "/boot/",
  "/usr/",
  "/bin/",
  "/sbin/",
]

# GitHub branch names where write operations escalate to "high" risk
approval_high_risk_branches = [
  "main",
  "master",
  "release",
]

# shell_run command prefixes that are always auto-approved despite "high" base level
approval_shell_safe_prefixes = [
  "ls",
  "cat",
  "echo",
  "git log",
  "git status",
  "git diff",
  "git show",
  "git branch",
  "pwd",
  "find",
  "grep",
  "uv run",
  "python",
  "pytest",
]

# Tools allowed for this session; empty list = all tools allowed (no restriction)
allowed_tools = []

# Tools that support dry_run=True; approval flow executes dry_run before prompting
approval_dry_run_tools = [
  "write_file",
  "edit_file",
  "create_directory",
  "delete_file",
  "delete_directory",
  "move_file",
  "git_checkout",
  "git_push",
  "github_create_branch",
  "github_create_or_update_file",
  "github_push_files",
  "github_delete_file",
  "github_create_issue",
  "github_add_issue_comment",
  "github_create_pull_request",
  "github_update_pull_request",
  "github_merge_pull_request",
  "trigger_workflow",
  "shell_run",
]

# Absolute path prefix that all file path arguments must be relative to.
# Empty string disables the root jail check.
allowed_root = "/opt/llm"

# GitHub repos (owner/repo) allowed for write operations.
# Empty list = Fail-Closed: all write ops to any repo are denied.
approval_github_allowed_repos = []

# Risk-based approval: tool_name → "none" | "medium" | "high"
# Tools absent from this dict are auto-approved (treated as "none").
# approval_risk_rules always takes priority over tier-derived defaults.

[approval_risk_rules]
write_file = "medium"
edit_file = "medium"
create_directory = "medium"
move_file = "medium"
delete_file = "high"
delete_directory = "high"
shell_run = "high"
github_push_files = "high"
github_create_or_update_file = "high"
github_delete_file = "high"
github_merge_pull_request = "high"
github_create_branch = "medium"
github_create_pull_request = "medium"
github_update_pull_request = "medium"
github_create_issue = "medium"
github_add_issue_comment = "medium"

# Arg keys treated as resource identifiers for path/branch escalation and audit scope

[approval_resource_keys]
path_keys = [
  "path",
  "file_path",
  "directory_path",
  "source",
  "destination",
]
branch_keys = [
  "branch",
  "base",
  "head",
]

# Tool safety tier: tool_name → "READ_ONLY" | "WRITE_SAFE" | "WRITE_DANGEROUS" | "ADMIN"
# Absent tools fall back to "WRITE_DANGEROUS" (Fail-Safe).
# approval_risk_rules always takes priority over tier-derived defaults.

[tool_safety_tiers]
# File operations
read_text_file           = "READ_ONLY"
list_directory           = "READ_ONLY"
directory_tree           = "READ_ONLY"
search_files             = "READ_ONLY"
grep_files               = "READ_ONLY"
write_file               = "WRITE_SAFE"
edit_file                = "WRITE_SAFE"
create_directory         = "WRITE_SAFE"
move_file                = "WRITE_SAFE"
delete_file              = "WRITE_DANGEROUS"
delete_directory         = "WRITE_DANGEROUS"
# Shell
shell_run                = "ADMIN"
# Web / search
search_web               = "READ_ONLY"
# GitHub
github_search_repositories   = "READ_ONLY"
github_search_code           = "READ_ONLY"
github_get_file_contents     = "READ_ONLY"
github_list_issues           = "READ_ONLY"
github_list_branches         = "READ_ONLY"
github_create_branch         = "WRITE_SAFE"
github_create_issue          = "WRITE_SAFE"
github_add_issue_comment     = "WRITE_SAFE"
github_push_files            = "WRITE_DANGEROUS"
github_create_or_update_file = "WRITE_DANGEROUS"
github_delete_file           = "WRITE_DANGEROUS"
github_create_pull_request   = "WRITE_DANGEROUS"
github_update_pull_request   = "WRITE_DANGEROUS"
github_merge_pull_request    = "WRITE_DANGEROUS"
# MDQ
mdq                      = "WRITE_DANGEROUS"
# RAG pipeline
rag_run_pipeline         = "READ_ONLY"
rag_debug_pipeline       = "READ_ONLY"
rag_list_documents       = "READ_ONLY"
rag_delete_document      = "WRITE_DANGEROUS"
# SQLite
query_sqlite             = "READ_ONLY"
# CI/CD
get_workflow_runs        = "READ_ONLY"
get_workflow_status      = "READ_ONLY"
get_workflow_logs        = "READ_ONLY"
trigger_workflow         = "WRITE_DANGEROUS"
# Git
git_status               = "READ_ONLY"
git_log                  = "READ_ONLY"
git_diff                 = "READ_ONLY"
git_branch               = "READ_ONLY"
git_show                 = "READ_ONLY"
git_add                  = "WRITE_SAFE"
git_commit               = "WRITE_SAFE"
git_checkout             = "WRITE_DANGEROUS"
git_pull                 = "WRITE_DANGEROUS"
git_push                 = "WRITE_DANGEROUS"
