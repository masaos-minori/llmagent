# github-mcp server configuration

# default_per_page: default item count for list endpoints; overridable by request
default_per_page = 20

# max_per_page: maximum item count for list endpoints
max_per_page = 100

# allowed_repos: whitelist of repos permitted for write operations (owner/repo format)
# When allowed_repos_mode is "fail_open": empty list = allow all
# When allowed_repos_mode is "fail_closed": empty list = deny all
allowed_repos = []

# allowed_repos_mode: behaviour when allowed_repos is empty
# "fail_open" = allow all (backward compat default); "fail_closed" = deny all (recommended for production)
allowed_repos_mode = "fail_closed"

# protected_branches: branch name glob patterns for which write operations are prohibited
protected_branches = ["main", "release/*"]

# allow_force_push: false prohibits rebase merges (rewrites commit history, equivalent to force push)
allow_force_push = false

# require_pr_review: true requires at least one APPROVED review before PR merge
require_pr_review = true

# path_denylist: glob patterns for file paths denied in push_files / create_or_update_file / delete_repo_file
path_denylist = []

# max_file_size_kb: maximum file size (KB) for push_files / create_or_update_file; 0 = unlimited
max_file_size_kb = 1024

# audit_log_path: structured audit log for write operations; empty string disables logging
audit_log_path = "/opt/llm/logs/github_audit.log"

[mcp_servers.github]
transport        = "http"
url              = "http://127.0.0.1:8006"
startup_mode     = "persistent"
healthcheck_mode = "http"
auth_token       = ""
role             = "search"
tool_names       = [
  "github_search_repositories", "github_get_file_contents", "github_list_issues",
  "github_search_code", "github_list_branches", "github_create_branch",
  "github_list_commits", "github_get_commit", "github_create_or_update_file",
  "github_push_files", "github_delete_file", "github_get_issue",
  "github_create_issue", "github_search_issues", "github_add_issue_comment",
  "github_list_pull_requests", "github_get_pull_request", "github_create_pull_request",
  "github_search_pull_requests", "github_update_pull_request", "github_merge_pull_request",
]
