# github-mcp server configuration

# NOTE: default_per_page was removed (2026-07-13). GitHubConfig.default_per_page is
# parsed and assigned to service_security.py's self._default_per_page, but that
# attribute is never subsequently read. The actual per-page default used by list
# endpoints is the module constant DEFAULT_PER_PAGE = 10 (models_config.py),
# referenced directly by the Pydantic request models -- independent of this
# config value. Re-add only alongside an implementation that reads
# self._default_per_page.

# max_per_page: maximum item count for list endpoints
max_per_page = 100

# allowed_repos: whitelist of repos permitted for write operations (owner/repo format)
# Empty list = deny all (fail-closed)
allowed_repos = []

# protected_branches: branch name glob patterns for which write operations are prohibited
protected_branches = ["main", "release/*"]

# allow_force_push: false prohibits rebase merges (rewrites commit history, equivalent to force push)
allow_force_push = false

# require_pr_review: true requires at least one APPROVED review before PR merge
require_pr_review = true

# path_denylist: glob patterns for file paths denied in push_files / create_or_update_file / delete_repo_file
path_denylist = []

# max_file_size_kb: maximum file size (KB) for push_files / create_or_update_file; 0 = unlimited
max_file_size_kb = 1024

# audit_log_path: structured audit log for write operations; empty string disables logging
audit_log_path = "/opt/llm/logs/github_audit.log"
