# LLM endpoint used for MQE, reranking, RAG answer generation, and conversation
llm_url = "http://127.0.0.1:8002/v1/chat/completions"

# Base URL of the web-search-mcp server; provides /search, /v1/call_tool, /health
web_search_url = "http://127.0.0.1:8004"

# Base URL of the github-mcp server; provides /search_repositories, /get_file_contents, etc.
github_server_url = "http://127.0.0.1:8006"

# Dimensionality of embedding vectors; multilingual-E5-small uses 384 dimensions
embed_dim = 384

# Number of top results to retrieve from both KNN vector search and BM25 full-text search
top_k_search = 20

# Maximum number of candidates passed to the Cross-Encoder reranker
top_k_rerank = 15

# Number of additional queries generated by MQE (Multi-Query Expansion: rephrases the query N ways)
mqe_n_queries = 3

# Constant for RRF (Reciprocal Rank Fusion: merges multiple search results using 1/(k+rank)); paper recommendation is 60
rrf_k = 60

# HTTP request timeout in seconds for llama-server; increase for slow models
http_timeout = 120.0

# Number of top results to retrieve from web search
web_search_max_results = 5

# Maximum number of tool-calling turns to prevent infinite loops in tool_query endpoint
max_tool_turns = 5

# When true, execute_all_tool_calls uses DAG scheduling with intra-round concurrency for
# non-conflicting groups. Ignored when serial_tool_calls=true. Default true.
use_tool_dag = true

# When total conversation history characters exceed this value, compress old turns via LLM summarization
context_char_limit = 8000

# Number of oldest turns to compress at once (user+assistant pair unit); replaces 2x this many messages with one summary
context_compress_turns = 4

# TTL in seconds for in-memory tool call result cache; reuses results within TTL for same tool name + same arguments
tool_cache_ttl = 300

# Maximum retry count on LLM request failure; uses exponential backoff for HTTP 503 / connection errors
llm_max_retries = 3

# Base wait seconds for exponential backoff; waits base_delay at attempt=0, 2*base_delay at attempt=1
llm_retry_base_delay = 1.0

# Maximum characters when adding tool call results to the LLM context; excess is truncated
tool_result_max_llm_chars = 8000

# Maximum total characters of all tool results in one turn; results exceeding this are replaced with a /tool show <id> hint
tool_results_turn_max_chars = 50000

# Maximum number of chunks retrieved from the same document; prevents near-duplicate chunks from chunk_overlap
max_chunks_per_doc = 2

# When true, /ingest treats Markdown as heading-unit snippet chunking; overridable with --snippets-only flag
md_index_enable = false

# Maximum characters for a single Markdown heading section; falls back to normal text chunking if exceeded
md_snippet_max_chars = 600

# When true, executes tool_calls sequentially in a loop instead of asyncio.gather() parallel execution; use when ordering is required for write->read dependencies
serial_tool_calls = false

# When true, allow plugin tools to shadow MCP tools by the same name;
# default false -- conflicts are rejected at startup with a clear error
plugin_tool_override = false
# When true, fail startup on first plugin import error; false = fail-open (log warning and continue)
plugin_strict = false

# When true, LLM-summarizes tool results exceeding tool_summarize_threshold characters before adding to LLM context
use_tool_summarize = false

# Character threshold for tool result summarization (default: 3000)
tool_summarize_threshold = 3000

# When true, caches RAG search results by query embedding cosine similarity and reuses for approximate queries
use_semantic_cache = false

# Cosine similarity threshold for cache hit determination (0-1, default: 0.92)
semantic_cache_threshold = 0.92

# Maximum number of entries in the semantic cache (default: 100)
semantic_cache_max_size = 100

# When true, treats tool definition mismatch at startup (diff between agent.json and /v1/tools) as RuntimeError and aborts
tool_definitions_strict = false

# MCP server health-check interval in seconds; 0 disables the watchdog.
# Default is profile-aware: 30s for security_profile=production, 0 for local.
# Set explicitly to override.

# Maximum restart count the watchdog performs for the same server; after exceeding, only logs a warning
mcp_watchdog_max_restarts = 3

# Security profile: "local" (auth optional) or "production" (auth required for HTTP MCP servers); changeable at runtime via /set security_profile <value>
security_profile = "local"

# LLM generation temperature (0.0-2.0); lower means more reproducible, higher means more diverse output; changeable at runtime via /set temperature <value>
llm_temperature = 0.2

# Maximum tokens the LLM generates in one turn; changeable at runtime via /set max_tokens <value>
llm_max_tokens = 1024

# When true, compresses RAG chunks after reranking to query-relevant key points before feeding to LLM context (RAG Refiner); falls back to original chunks on failure
use_refiner = false

# Maximum generated tokens for the Refiner LLM call (default: 512)
refiner_max_tokens = 512

# HTTP timeout in seconds for the Refiner LLM call (default: 30.0)
refiner_timeout = 30.0

# Maximum characters per chunk passed to the Refiner; excess is truncated to prevent token explosion (default: 300)
refiner_max_chars_per_chunk = 300

# Maximum number of times the same (tool name + arguments) combination may execute; cuts the turn and injects a warning to the LLM when this count is reached (default: 3)
tool_dedup_max_repeats = 3

# Round-level cycle detection window size; cuts the turn if the same round fingerprint (MD5 of tool call set) appears this many times; 0 disables (default: 2)
tool_cycle_detect_window = 2

# Cuts the turn when all tools return errors for this many consecutive turns; 0 disables (default: 3)
tool_error_max_consecutive = 3

# Maximum entries in the tool cache; evicted by LRU; 0 = unlimited (default: 200)
tool_cache_max_size = 200

# Maximum retry count after the same (name, args) results in an error; 0 = disabled (default: 1)
tool_error_retry_max = 1

# Per-tool-server concurrent execution limit; key is the server key from _route(); unknown keys log WARNING at startup; empty = unlimited (default: {})
tool_concurrency_limits = {file_read = 4, file_write = 1, file_delete = 1, shell = 2, web_search = 2, github = 3, rag_pipeline = 4, sqlite = 4, cicd = 2, mdq = 1}

# Token-based history compression monitoring threshold; 0 disables; logs logger.warning when chars/4 exceeds this value
context_token_limit = 0

# Excludes the most recent N turns (user+assistant pairs) from compression; default 2
history_protect_turns = 2

# When true, enables persistent semantic memory layer; default false
use_memory_layer = false

# Directory for JSONL memory source-of-truth files
memory_jsonl_dir = "/opt/llm/memory"

# Max semantic memory entries injected at SessionStart
memory_max_inject_semantic = 5

# Max episodic memory entries injected per UserPromptSubmit
memory_max_inject_episodic = 3

# Minimum importance score (0.0–1.0) for memory injection
memory_min_importance = 0.3

# Phase 2 memory: when true, generates embeddings and enables KNN hybrid search
memory_embed_enabled = false

# Embedding vector dimension; must match the vec0 schema (default 384)
memory_embed_dim = 384

# L2 distance threshold for deduplication; entries closer than this are linked in memory_links
memory_dedup_threshold = 0.3

# Max characters stored per extracted memory entry; content trimmed at extraction time
memory_max_content_chars = 500

# Timeout in seconds for each embedding HTTP call
memory_embed_timeout_sec = 5.0

# Retention period in days; entries older than this can be pruned via /memory prune
memory_retention_days = 90

# When true, enables OpenTelemetry span collection; default false
otel_enabled = false

# OTLP HTTP endpoint URL; uses ConsoleSpanExporter when empty string
otel_endpoint = ""

# OTel service.name attribute; default llm-agent
otel_service_name = "llm-agent"

# Allowed root path for file path arguments (absolute path); paths outside this root are immediately rejected; empty string disables the check
allowed_root = ""

# List of repositories ('owner/repo' format) allowed for GitHub write operations; empty list acts as Fail-Closed (rejects all writes)
approval_github_allowed_repos = []

# List of tool argument field names to mask in console display and log output; specify fields such as file_content that may contain sensitive data
masked_fields = ["file_content"]

# List of tool names to automatically block when /plan mode is active; enumerate destructive write/delete operations
plan_blocked_tools = [
  "write_file",
  "create_directory",
  "delete_file",
  "delete_directory",
  "shell_run",
  "git_push",
  "git_checkout",
]

# List of tool names that receive dry_run=True automatically before the user sees the approval prompt
approval_dry_run_tools = [
  "write_file",
  "edit_file",
  "create_directory",
  "delete_file",
  "delete_directory",
  "git_checkout",
  "git_push",
  "github_create_branch",
  "github_create_or_update_file",
  "github_push_files",
  "github_delete_file",
  "github_create_issue",
  "github_add_issue_comment",
  "github_create_pull_request",
  "github_update_pull_request",
  "github_merge_pull_request",
  "trigger_workflow",
  "shell_run",
]

# List of tool names allowed for this session; empty list means unrestricted (all tools usable)
allowed_tools = []

# System prompt used in RAG mode (/query); instructs to answer based on provided context
system_prompt_rag = "あなたは有能なエンジニアアシスタントです。必ず提供されたコンテキストのみに基づいて質問に回答してください。コンテキストに答えが含まれない場合は「提供されたコンテキストに該当情報がありません」と回答してください。"

# System prompt used in tool-calling mode (/tool_query); instructs to leverage tools
system_prompt_tool = "あなたは有能なエンジニアアシスタントです。必要に応じてツールを使って情報を収集し、正確に回答してください。"

# Prompt template for MQE query rephrasing; uses {n_queries} and {query} as placeholders
mqe_prompt_template = "Without changing the meaning of the following question, please rephrase it in {n_queries} different ways.\nOutput the result as a JSON array. (ex: [\"Q1\", \"Q2\", \"Q3\"])\n\nQuestion: {query}\n"

# Prompt template for Cross-Encoder reranking scoring; uses {query} and {items_text} as placeholders
rerank_prompt_template = "Please evaluate the relevance of the following question and each context on a scale from 0 to 10.\nOutput the result as a JSON object mapping each context number to its score. (ex: {{\"1\": 8, \"2\": 3}})\n\nQuestion: {query}\nContext:\n{items_text}\n"

# ---- system_prompts ----
# Dictionary of system prompts switchable with /system <name> during a session; key is preset name, value is prompt string
[system_prompts]
default  = "あなたは有能なエンジニアアシスタントです。必要に応じてツールを使って情報を収集し、正確に回答してください。"
strict   = "あなたは厳格なエンジニアアシスタントです。事実のみを回答し、不確かな情報は「不明」と答えてください。ツールを積極的に使用して情報を確認してください。"
creative = "あなたは創造的なエンジニアアシスタントです。複数のアプローチや代替案を提案し、自由な発想で問題解決を支援してください。"

# ---- tool_safety_tiers ----
# Map of tool name -> safety tier ('READ_ONLY'|'WRITE_SAFE'|'WRITE_DANGEROUS'|'ADMIN');
# approval_risk_rules takes precedence; unregistered tools fall back to WRITE_DANGEROUS (Fail-Safe);
# tier -> default approval level: READ_ONLY/WRITE_SAFE=none, WRITE_DANGEROUS=medium, ADMIN=high
[tool_safety_tiers]
read_text_file             = "READ_ONLY"
list_directory             = "READ_ONLY"
directory_tree             = "READ_ONLY"
search_files               = "READ_ONLY"
grep_files                 = "READ_ONLY"
search_web                 = "READ_ONLY"
github_search_repositories = "READ_ONLY"
github_search_code         = "READ_ONLY"
github_get_file_contents   = "READ_ONLY"
github_list_issues         = "READ_ONLY"
github_list_branches       = "READ_ONLY"
write_file                 = "WRITE_SAFE"
edit_file                  = "WRITE_SAFE"
create_directory           = "WRITE_SAFE"
move_file                  = "WRITE_SAFE"
github_create_branch       = "WRITE_SAFE"
github_create_issue        = "WRITE_SAFE"
github_add_issue_comment   = "WRITE_SAFE"
delete_file                = "WRITE_DANGEROUS"
delete_directory           = "WRITE_DANGEROUS"
github_delete_file         = "WRITE_DANGEROUS"
github_push_files          = "WRITE_DANGEROUS"
github_create_or_update_file = "WRITE_DANGEROUS"
github_merge_pull_request  = "WRITE_DANGEROUS"
github_create_pull_request = "WRITE_DANGEROUS"
mdq                        = "WRITE_DANGEROUS"
github_update_pull_request = "WRITE_DANGEROUS"
shell_run                  = "ADMIN"
rag_run_pipeline           = "READ_ONLY"
rag_debug_pipeline         = "READ_ONLY"
rag_list_documents         = "READ_ONLY"
rag_delete_document        = "WRITE_DANGEROUS"
query_sqlite               = "READ_ONLY"
get_workflow_runs          = "READ_ONLY"
get_workflow_status        = "READ_ONLY"
get_workflow_logs          = "READ_ONLY"
trigger_workflow           = "WRITE_DANGEROUS"
git_status                 = "READ_ONLY"
git_log                    = "READ_ONLY"
git_diff                   = "READ_ONLY"
git_branch                 = "READ_ONLY"
git_show                   = "READ_ONLY"
git_add                    = "WRITE_SAFE"
git_commit                 = "WRITE_SAFE"
git_checkout               = "WRITE_DANGEROUS"
git_pull                   = "WRITE_DANGEROUS"
git_push                   = "WRITE_DANGEROUS"

# ---- mcp_servers ----
# MCP server transport configuration.
# transport='http' uses url.
# MDQ/RAG routing mode: "auto" (classifier), "mdq" (force MDQ), "rag" (force RAG)
# mdq_rag_mode = "auto"

[mcp_servers.web_search]
transport        = "http"
url              = "http://127.0.0.1:8004"
cmd              = ["/opt/llm/venv/bin/uvicorn", "mcp.web_search.server:app", "--host", "127.0.0.1", "--port", "8004", "--workers", "1"]
startup_mode     = "subprocess"
startup_timeout_sec = 30
healthcheck_mode = "http"
auth_token       = ""
role             = "search"
tool_names       = ["search_web"]

[mcp_servers.file_read]
transport        = "http"
url              = "http://127.0.0.1:8005"
cmd              = ["/opt/llm/venv/bin/uvicorn", "mcp.file.read_server:app", "--host", "127.0.0.1", "--port", "8005", "--workers", "1"]
startup_mode     = "subprocess"
startup_timeout_sec = 30
healthcheck_mode = "http"
auth_token       = ""
role             = "file_read"
tool_names       = ["read_text_file", "list_directory", "directory_tree", "search_files", "grep_files"]

[mcp_servers.github]
transport        = "http"
url              = "http://127.0.0.1:8006"
cmd              = ["/opt/llm/venv/bin/uvicorn", "mcp.github.server:app", "--host", "127.0.0.1", "--port", "8006", "--workers", "1"]
startup_mode     = "subprocess"
startup_timeout_sec = 30
healthcheck_mode = "http"
auth_token       = ""
role             = "search"
tool_names       = [
  "github_search_repositories", "github_get_file_contents", "github_list_issues",
  "github_search_code", "github_list_branches", "github_create_branch",
  "github_create_issue", "github_add_issue_comment", "github_delete_file",
  "github_push_files", "github_create_or_update_file",
  "github_merge_pull_request", "github_create_pull_request", "github_update_pull_request",
