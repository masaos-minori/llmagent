[tool_definitions.function.parameters.properties.owner]
type        = "string"
description = "リポジトリオーナー名 (GitHubユーザー名またはOrg名)"

[tool_definitions.function.parameters.properties.repo]
type        = "string"
description = "リポジトリ名"

[tool_definitions.function.parameters.properties.path]
type        = "string"
description = "ファイルパス (リポジトリルートからの相対パス)"

[tool_definitions.function.parameters.properties.ref]
type        = "string"
description = "ブランチ名・タグ名・コミットSHA (省略時: デフォルトブランチ)"

[[tool_definitions]]
type = "function"

[tool_definitions.function]
name        = "github_list_issues"
description = "GitHub リポジトリのイシュー一覧を取得する。バグ報告・機能要望・既知の問題を調べるときに使う。"

[tool_definitions.function.parameters]
type     = "object"
required = ["owner", "repo"]

[tool_definitions.function.parameters.properties.owner]
type        = "string"
description = "リポジトリオーナー名"

[tool_definitions.function.parameters.properties.repo]
type        = "string"
description = "リポジトリ名"

[tool_definitions.function.parameters.properties.state]
type        = "string"
description = "イシューの状態: open / closed / all (省略時: open)"

[[tool_definitions]]
type = "function"

[tool_definitions.function]
name        = "github_search_code"
description = "GitHub 上のコードを全文検索する。特定の関数・クラス・パターンの実装例を探すときに使う。"

