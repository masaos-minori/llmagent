# When true, compresses RAG chunks after reranking to query-relevant key points before feeding to LLM context (RAG Refiner); falls back to original chunks on failure
use_refiner = false

# Maximum generated tokens for the Refiner LLM call (default: 512)
refiner_max_tokens = 512

# HTTP timeout in seconds for the Refiner LLM call (default: 30.0)
refiner_timeout = 30.0

# Maximum characters per chunk passed to the Refiner; excess is truncated to prevent token explosion (default: 300)
refiner_max_chars_per_chunk = 300

# When true, treats tool definition mismatch at startup (diff between agent.json and /v1/tools) as RuntimeError and aborts
tool_definitions_strict = false

# When true, enables persistent semantic memory layer; default false
use_memory_layer = false

# Directory for JSONL memory source-of-truth files
memory_jsonl_dir = "/opt/llm/memory"

# Max semantic memory entries injected at SessionStart
memory_max_inject_semantic = 5

# Max episodic memory entries injected per UserPromptSubmit
memory_max_inject_episodic = 3

# Minimum importance score (0.0–1.0) for memory injection
memory_min_importance = 0.3

# Phase 2 memory: when true, generates embeddings and enables KNN hybrid search
memory_embed_enabled = false

# Embedding vector dimension; must match the vec0 schema (default 384)
memory_embed_dim = 384

# L2 distance threshold for deduplication; entries closer than this are linked in memory_links
memory_dedup_threshold = 0.3

# When true, enables OpenTelemetry span collection; default false
otel_enabled = false

# OTLP HTTP endpoint URL; uses ConsoleSpanExporter when empty string
otel_endpoint = ""

# OTel service.name attribute; default llm-agent
otel_service_name = "llm-agent"

# Allowed root path for file path arguments (absolute path); paths outside this root are immediately rejected; empty string disables the check
allowed_root = ""

# List of repositories ('owner/repo' format) allowed for GitHub write operations; empty list acts as Fail-Closed (rejects all writes)
approval_github_allowed_repos = []

# List of tool argument field names to mask in console display and log output; specify fields such as file_content that may contain sensitive data
masked_fields = ["file_content"]

# List of tool names to automatically block when /plan mode is active; enumerate destructive write/delete operations
plan_blocked_tools = [
  "write_file",
  "create_directory",
  "delete_file",
  "delete_directory",
  "shell_run",
]